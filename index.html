<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vodafone Announcement</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6e6e6;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            border-top: 8px solid #e60000; /* Vodafone Red */
        }
        .header {
            color: #e60000;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        h1 {
            font-size: 2.5rem;
            color: #333;
            margin: 0 0 20px 0;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">Announcement from Vodafone</div>
        <h1>Hello Samira,</h1>
        <p>We are excited to announce that we have a new product launching next month.</p>
        <p>For more details go to https://www.vodafone.co.uk/new/product.com</p>
    </div>

</body>
</html>
